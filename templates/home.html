{% extends 'base.html' %}

{% block content %}
<div class="forest-home-container" style="animation: fadeIn 1s cubic-bezier(0.4, 0, 0.2, 1) both;">
    <div class="glass-hero-panel">
        <h1 class="project-title">TerraGuard Core</h1>
        <p class="project-tagline">Advanced Spatiotemporal Deforestation Sentinel</p>
        
        <div style="margin-top: 36px; display: flex; justify-content: center; width: 100%;">
            <a href="/dashboard" class="btn btn-primary" style="padding: 14px 40px; font-size: 1rem; border-radius: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; background: linear-gradient(135deg, var(--accent-primary), #059669); color: #040810; display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35); text-decoration: none;">
                <i data-lucide="shield" style="width: 18px; height: 18px;"></i>
                Enter Project Portal
            </a>
        </div>
    </div>
</div>

<style>
.forest-home-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    width: 100%;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    background-image: linear-gradient(rgba(8, 12, 20, 0.35), rgba(8, 12, 20, 0.75)), url("{{ url_for('static', filename='premium_forest_bg.png') }}");
    background-size: cover;
    background-position: center;
    border: 1px solid var(--border-color);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
}

.glass-hero-panel {
    background: rgba(13, 21, 39, 0.35);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 60px 80px;
    border-radius: 24px;
    text-align: center;
    max-width: 650px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
    animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    position: relative;
}

.glass-hero-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(6, 182, 212, 0.05));
    pointer-events: none;
}

.project-title {
    font-family: var(--font-outfit);
    font-size: 3.8rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffffff, #a7f3d0, #22d3ee);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 6s linear infinite;
    text-shadow: 0 0 40px rgba(16, 185, 129, 0.2);
}

.project-tagline {
    font-family: var(--font-inter);
    color: #94a3b8;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes shine {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.glass-hero-panel a:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5) !important;
}
</style>
{% endblock %}
